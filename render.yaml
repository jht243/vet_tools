services:
  - type: web
    name: vet-tools
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        sync: false
      - key: SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_REPORT_OBJECT_KEY
        value: va-report.html
      - key: ADMIN_TOKEN
        sync: false

  - type: cron
    name: vet-tools-daily
    runtime: python
    schedule: "0 15,22 * * *"
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run_daily.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: BUTTONDOWN_API_KEY
        sync: false
      - key: NEWSLETTER_PROVIDER
        value: buttondown
      - key: NEWSLETTER_FROM_EMAIL
        sync: false
      - key: SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_INDEXING_SA_JSON
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_REPORT_OBJECT_KEY
        value: va-report.html
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: jht243/vet_tools
      - key: LOG_LEVEL
        value: INFO
